# avoid running path_helper on MacOS by running non-login shell
set -g default-command "${SHELL}"

set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",tmux-256color:RGB"
set -g focus-events on
set -g mouse on
setw -g mode-keys vi
set -sg escape-time 0
set -g set-clipboard external

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Easy window (tab) switching — no prefix needed
bind -n M-Left previous-window
bind -n M-Right next-window
bind -n S-Left previous-window
bind -n S-Right next-window

# Jump directly to window N with Alt+N
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Quick new window and toggle to last window
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-w last-window

# Start windows at 1 and renumber on close so Alt+N stays stable
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Status bar / tabs ─────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Classic tmux green-on-black, just cleaner
set -g status-style "bg=black,fg=green"

set -g status-left-length 30
set -g status-left "#[fg=black,bg=green,bold] #S #[fg=green,bg=black] "

set -g status-right-length 60
set -g status-right "#[fg=green]%Y-%m-%d %H:%M #[fg=black,bg=green,bold] #h "

setw -g window-status-format " #I:#W "
setw -g window-status-style "fg=green,bg=black"
setw -g window-status-separator ""

setw -g window-status-current-format " #I:#W#{?window_zoomed_flag,*,} "
setw -g window-status-current-style "fg=black,bg=green,bold"

setw -g window-status-activity-style "fg=yellow,bg=black"
setw -g monitor-activity on
set -g visual-activity off

set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=green"

set -g message-style "fg=black,bg=green,bold"
